name: iOS Beta unsigned ipa Build

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-and-upload:
    name: Build and upload to Artifacts
    runs-on: macos-26
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      LANGUAGE: en_US.UTF-8
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: fluxerapp/flutter_client
          ref: "beta"
          submodules: recursive

      - name: Detect preinstalled Flutter
        id: detect_flutter
        run: |
          if command -v flutter >/dev/null 2>&1; then
            echo "::notice::Using preinstalled Flutter: $(flutter --version | head -n 1)"
            echo "flutter_installed=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Flutter not found. Workflow will install it."
            echo "flutter_installed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Flutter
        if: steps.detect_flutter.outputs.flutter_installed != 'true'
        # Temp use while waiting for a pr: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        uses: axi92/flutter-action@72633a794ba0b23276fa4fc465a6cacb758a90c5
        with:
          channel: stable

      - name: Restore pub cache
        if: runner.environment != 'self-hosted'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Strip Firebase dependencies if present
        run: dart run tool/strip_firebase_deps.dart

      - name: Get dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build
        run: flutter build ios --no-codesign --release

      - name: Packaging ipa
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r Fluxer.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fluxer
          path: Fluxer.ipa
