name: iOS Beta unsigned ipa Build

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    name: Build and upload to Artifacts
    runs-on: macos-26
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      LANGUAGE: en_US.UTF-8
    steps:
      - name: Checkout repository
          uses: actions/checkout@v4
          with:
            ref: "main"
            path: "patch"

      - name: Clone from Official Fluxer Client repository
        uses: actions/checkout@v4
        with:
          repository: fluxerapp/flutter_client
          ref: "beta"
          submodules: recursive

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git
          echo "$(pwd)/flutter/bin" >> $GITHUB_PATH

      - name: Get dependencies
        run: flutter pub get

      - name: Patch spoof platform
        run: patch -p1 -i patch/platform_spoof.patch lib/core/api/fluxer_client_properties.dart

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build
        run: flutter build ios --release --flavor beta --no-codesign --dart-define-from-file=tool/dart_defines/beta.json --dart-define=PUSH_PROVIDER=apns

      - name: Packaging ipa
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r FluxerBeta.ipa Payload

      - name: Upload to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluxerBeta
          path: FluxerBeta.ipa
