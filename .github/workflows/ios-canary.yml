name: iOS Canary IPA Build(unsigned)

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    name: Build and upload to Artifacts
    runs-on: macos-26
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      LANGUAGE: en_US.UTF-8
    steps:
      - name: Clone from Official Fluxer Client repository
        uses: actions/checkout@v4
        with:
          repository: fluxerapp/flutter_client
          ref: "canary"
          submodules: recursive

      - name: Clone this repository
        run: git clone https://github.com/$GITHUB_REPOSITORY.git patch

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git
          echo "$(pwd)/flutter/bin" >> $GITHUB_PATH

      - name: Get dependencies
        run: flutter pub get

      - name: Patch spoof platform
        run: patch -p1 -i patch/platform_spoof.patch lib/core/api/fluxer_client_properties.dart

      - name: Run build_runner
        run: dart run build_runner build

      - name: Build
        run: flutter build ios --release --flavor canary --no-codesign --dart-define-from-file=tool/dart_defines/canary.json --dart-define=PUSH_PROVIDER=apns

      - name: Packaging ipa
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r FluxerCanary.ipa Payload

      - name: Upload to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluxerCanary
          path: FluxerCanary.ipa
